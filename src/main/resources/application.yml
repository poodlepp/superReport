spring:
  application:
    name: supe-report
  ai:
    anthropic:
      base-url: ${AI_CLAUDE_BASE_URL:}
      api-key: ${AI_CLAUDE_API_KEY:}
      chat:
        options:
          model: ${AI_CLAUDE_MODEL:}
          temperature: 0.7
          max-tokens: 8192
          top-p: 0.9
          top-k: 40
    openai:
      base-url: ${AI_OPENAI_BASE_URL:}
      api-key: ${AI_OPENAI_API_KEY:placeholder}
      chat:
        options:
          model: ${AI_OPENAI_MODEL:gpt-4o}
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:placeholder}
      chat:
        options:
          model: ${AI_DASHSCOPE_MODEL:qwen-max}

server:
  port: 8080

supe:
  ai:
    provider: ${SUPE_AI_PROVIDER:anthropic}
